version: "3.8"

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./api/.env.dev
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/data/uploads
    restart: unless-stopped
    networks:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: healthmap
      POSTGRES_PASSWORD: healthmap_dev
      POSTGRES_DB: healthmap
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U healthmap" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - api

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "4242:4242"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
  uploads:


networks:
  api:
    driver: bridge
